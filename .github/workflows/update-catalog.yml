name: Update Catalog

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'sources.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build catalog
        run: node build-catalog.js

      - name: Check for broken plugins
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const catalog = JSON.parse(fs.readFileSync('catalog.json', 'utf8'));
            const broken = catalog.plugins.filter(p => p.status === 'broken');
            if (broken.length) {
              const body = `## Сломанные плагины (${broken.length})\n\n` +
                broken.map(p => `- **${p.name}** (${p.id}) — ${p.script_url}`).join('\n') +
                '\n\n_Автоматически создано GitHub Actions_';
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⚠ Обнаружено сломанных плагинов: ${broken.length}`,
                body: body,
                labels: ['broken-plugin']
              });
              console.log(`Created issue for ${broken.length} broken plugins`);
            }

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: auto-update catalog [skip ci]"
          git push
